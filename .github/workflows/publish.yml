name: Render & Publish (HTML)

# =========================================================================
#  Pipeline moderno do GitHub Pages — "Build & deployment: GitHub Actions"
#  (NÃO usa branch gh-pages; deploy via artifact assinado.)
#
#  Pré-requisito no repositório:
#    Settings → Pages → Build and deployment → Source: GitHub Actions
#
#  Estrutura em 3 jobs:
#    1. validate-bib  → roda validate_bib.py + deep_validate_bib.py.
#                       Falha bloqueia tudo. Em PRs, só este job roda.
#    2. build         → renderiza HTML + EPUB com Quarto, empacota como
#                       Pages artifact.
#    3. deploy        → publica o artifact em github-pages (URL pública).
#                       Só em push para main; PRs não publicam.
# =========================================================================

on:
  push:
    branches: [main]
    paths:
      - '**/*.qmd'
      - '**/*.bib'
      - '**/*.scss'
      - '**/*.css'
      - '**/*.yml'
      - 'code/**'
  pull_request:
    branches: [main]
  workflow_dispatch:    # permite rodar manualmente na aba Actions

# Permissões mínimas necessárias para deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write       # exigido pelo OIDC do deploy-pages

# Não cancelar deploys em andamento (recomendado pela Anthropic do GitHub Pages)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  # =====================================================================
  # JOB 1 — Validação bibliográfica (não publica nada)
  # =====================================================================
  validate-bib:
    name: Validar bibliografia
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: code/requirements.txt

      - name: Instalar dependências do validador
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Validação rápida (cites órfãos, campos ABNT, padrão de chave)
        run: |
          python code/validate_bib.py \
            --no-doi \
            --json validation-basic.json

      - name: Validação profunda (Crossref, metadados)
        run: |
          python code/deep_validate_bib.py
        continue-on-error: true    # gera relatório mas não bloqueia o build
                                   # — DOIs externos podem falhar por rate-limit
                                   # transitório; o relatório vai pro artifact.

      - name: Upload relatórios de validação
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bibliography-reports
          path: |
            validation-basic.json
            validation-deep.json
            validation-deep.html
          retention-days: 30

  # =====================================================================
  # JOB 2 — Build (Quarto render + empacotamento como Pages artifact)
  # =====================================================================
  build:
    name: Build site (Quarto)
    needs: validate-bib
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'   # PRs só validam
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necessário para data do último commit nas páginas

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.5.57'

      - name: Versão do Quarto
        run: quarto --version

      - name: Cache do _freeze e .quarto
        uses: actions/cache@v4
        with:
          path: |
            _freeze
            .quarto
          key: quarto-${{ runner.os }}-${{ hashFiles('**/*.qmd', '_quarto.yml', 'references/references.bib') }}
          restore-keys: |
            quarto-${{ runner.os }}-

      - name: Render HTML
        run: quarto render --to html

      - name: Listar saída
        run: ls -la _book/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_book

  # =====================================================================
  # JOB 3 — Deploy (publica o artifact em github-pages)
  # =====================================================================
  deploy:
    name: Deploy → GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    # Environment oficial 'github-pages' — exibe URL pública na UI do Actions
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
